name: Deploy to Production

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Run migrations (optional — enable if using supabase CLI in CI)
        # TODO: Uncomment and set SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_ID secrets
        # run: |
        #   npm install -g supabase
        #   supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        run: echo "Migration step disabled — run manually or via Supabase dashboard"

      - name: Deploy to Vercel (production)
        id: deploy
        # TODO: Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to GitHub repo secrets
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Comment deploy URL on commit
        if: success()
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
